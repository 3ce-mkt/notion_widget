<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
    <!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">
    <title>Week and Date Widget</title>

    <style>
        body{
            font-variant-caps: all-small-caps;
            font-family: 'Staatliches', monospace;
            /* width: 300px; */
            width: 30rem;
        }

        .widget {
            padding: 5px 5px ;
            color: #000000;
            display: flex;
            justify-content:center;
            align-items: baseline;
            /* max-width: 20%; */
            max-width: 100%;
            /* margin: auto; */
            border: 2px solid #e71d9e;
            border-radius: 5px;
            box-shadow: 2px 2px 1px 0px #e71d9e;
        }

        .month {
            font-size: 4rem;
            text-decoration: underline;
            color: #1800ad;
        }

        .pre-month {
            font-size: 2.2rem;
            color: #242424;
        }

    </style>
</head>
<body>
<div class="widget">
  <div class="pre-month" id="pre-month">Mês corrente:</div>  
  <div class="month" id="month"></div>
</div>

<script>
    function widgetDisplay() {  
        var today = new Date();
       
        const MONTH = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        var monthName = MONTH[today.getMonth()];
        var year = today.getFullYear();
        var monthDisplay = document.getElementById('month');
        monthDisplay.innerHTML = "&emsp;" + monthName + "/" + year;
    }

    widgetDisplay()
</script>

</body>
</html>
